name: IPTV Auto Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install requests

      - name: Run script
        run: python check_ip.py

      - name: Show files (debug)
        run: |
          ls -lah
          cat current_ip.txt || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add current_ip.txt output.m3u

          git commit -m "update IPTV source" || echo "no changes"

          git push
