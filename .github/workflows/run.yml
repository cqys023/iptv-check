name: IPTV Check

on:
  schedule:
    - cron: '0 2 * * *'   # 每天运行
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 拉代码
        uses: actions/checkout@v3

      - name: Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 执行脚本
        run: python check_ip.py

      - name: 提交结果
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add current_ip.txt
          git commit -m "update ip" || echo "no change"
          git push
